<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Lifehacks</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&family=Nunito:wght@700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ===== ANIMATED BG ===== */
  .bg {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #EDE0FF, #FFE8D6, #D6FFE8, #D6EEFF, #FFD6E8, #EDE0FF);
    background-size: 500% 500%;
    animation: bgShift 14s ease infinite;
    z-index: 0;
  }
  @keyframes bgShift {
    0%   { background-position: 0% 50%; }
    25%  { background-position: 50% 0%; }
    50%  { background-position: 100% 50%; }
    75%  { background-position: 50% 100%; }
    100% { background-position: 0% 50%; }
  }

  /* ===== GEOMETRIC SHAPES (subtler, don't fight cards) ===== */
  .geo { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }

  .ring {
    position: absolute;
    border-radius: 50%;
    border-style: solid;
    animation: spin linear infinite;
  }
  .r1 { width: 320px; height: 320px; border-width: 10px; border-color: rgba(180,140,255,0.15); top: -130px; left: -100px; animation-duration: 32s; }
  .r2 { width: 200px; height: 200px; border-width: 6px;  border-color: rgba(255,160,200,0.13); top: 15%; right: -70px; animation-duration: 22s; animation-direction: reverse; }
  .r3 { width: 440px; height: 440px; border-width: 12px; border-color: rgba(100,210,160,0.1);  bottom: -180px; right: 0%; animation-duration: 48s; }
  .r4 { width: 120px; height: 120px; border-width: 4px;  border-color: rgba(120,180,255,0.18); bottom: 22%; left: 2%; animation-duration: 18s; animation-direction: reverse; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .dot { position: absolute; border-radius: 50%; animation: float ease-in-out infinite; }
  .d1 { width: 44px; height: 44px; background: rgba(180,140,255,0.2);  top: 10%; left: 4%;   animation-duration: 7s; }
  .d2 { width: 20px; height: 20px; background: rgba(255,140,190,0.25); top: 35%; right: 4%;  animation-duration: 8s;  animation-delay: -2s; }
  .d3 { width: 56px; height: 56px; background: rgba(100,210,160,0.14); bottom: 20%; left: 1%; animation-duration: 10s; animation-delay: -4s; }
  .d4 { width: 14px; height: 14px; background: rgba(255,200,80,0.35);  top: 62%; right: 8%;  animation-duration: 6s;  animation-delay: -1s; }
  .d5 { width: 30px; height: 30px; background: rgba(100,170,255,0.18); top: 50%; left: 9%;   animation-duration: 9s;  animation-delay: -3s; }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

  .tri { position: absolute; width: 0; height: 0; animation: triFloat ease-in-out infinite; }
  .t1 { border-left: 32px solid transparent; border-right: 32px solid transparent; border-bottom: 56px solid rgba(180,140,255,0.16); top: 30%; right: 1%; animation-duration: 14s; }
  .t2 { border-left: 18px solid transparent; border-right: 18px solid transparent; border-bottom: 32px solid rgba(255,160,200,0.18); bottom: 40%; right: 6%; animation-duration: 10s; animation-delay: -4s; }
  .t3 { border-left: 24px solid transparent; border-right: 24px solid transparent; border-bottom: 42px solid rgba(100,210,160,0.15); top: 5%; right: 16%; animation-duration: 18s; animation-delay: -7s; }
  @keyframes triFloat {
    0%   { transform: rotate(0deg) translateY(0); }
    33%  { transform: rotate(120deg) translateY(-16px); }
    66%  { transform: rotate(240deg) translateY(-8px); }
    100% { transform: rotate(360deg) translateY(0); }
  }

  .sq { position: absolute; border-radius: 5px; animation: squareSpin linear infinite; }
  .s1 { width: 44px; height: 44px; background: rgba(255,200,80,0.18);  bottom: 9%; left: 6%;  animation-duration: 22s; }
  .s2 { width: 24px; height: 24px; background: rgba(255,140,190,0.22); top: 20%; left: 1%;   animation-duration: 14s; animation-direction: reverse; }
  .s3 { width: 32px; height: 32px; background: rgba(100,170,255,0.16); bottom: 48%; right: 2%; animation-duration: 19s; }
  @keyframes squareSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* ===== PAGE ===== */
  .page {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 56px 20px 80px;
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  .title-block { text-align: center; margin-bottom: 48px; }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 3rem;
    font-weight: 800;
    color: #2A1060;
    letter-spacing: -2px;
    line-height: 1.05;
    margin-bottom: 10px;
  }

  .subtitle {
    font-size: 0.82rem;
    font-weight: 900;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #8060B8;
  }

  /* ===== CARD GRID ===== */
  .cards {
    width: 100%;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ===== BASE CARD (8px grid, flex column) ===== */
  .card {
    background: rgba(255,255,255,0.74);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    border: 2px solid rgba(255,255,255,0.88);
    border-radius: 24px;
    padding: 24px 24px 20px;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(100,60,180,0.09), 0 1px 4px rgba(100,60,180,0.05);
    animation: popIn 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }
  .card:nth-child(1) { animation-delay: 0.04s; }
  .card:nth-child(2) { animation-delay: 0.15s; }
  .card:nth-child(3) { animation-delay: 0.26s; }

  @keyframes popIn {
    from { opacity: 0; transform: translateY(24px) scale(0.94); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Decorative blob top-right */
  .card::after {
    content: '';
    position: absolute;
    width: 100px; height: 100px;
    border-radius: 50%;
    top: -36px; right: -28px;
    opacity: 0.12;
    pointer-events: none;
  }

  /* ===== ACCENT COLORS via class ===== */
  .acc-purple::before { background: linear-gradient(90deg, #C4A0FF, #FF9EC8); }
  .acc-purple::after  { background: #C4A0FF; }
  .acc-purple .card-num        { color: #7030B8; }
  .acc-purple .card-num::after { background: #C4A0FF; }
  .acc-purple .card-action     { background: #F0E6FF; color: #5820A0; }
  .acc-purple .card-expert-name { color: #5030A0; }

  .acc-green::before { background: linear-gradient(90deg, #80DDAA, #80C8FF); }
  .acc-green::after  { background: #80DDAA; }
  .acc-green .card-num        { color: #208058; }
  .acc-green .card-num::after { background: #80DDAA; }
  .acc-green .card-action     { background: #DCFFF0; color: #106840; }
  .acc-green .card-expert-name { color: #187050; }

  .acc-peach::before { background: linear-gradient(90deg, #FFD080, #FF9EC8, #FFB060); }
  .acc-peach::after  { background: #FFD080; }
  .acc-peach .card-num        { color: #B07018; }
  .acc-peach .card-num::after { background: #FFD080; }
  .acc-peach .card-action     { background: #FFF4D8; color: #906010; }
  .acc-peach .card-expert-name { color: #A06818; }

  /* Top bar — shared */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    border-radius: 24px 24px 0 0;
  }

  /* ===== CARD CONTENT ===== */
  .card-label {
    font-size: 0.72rem;
    font-weight: 900;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-label::after {
    content: '';
    display: block;
    height: 2px;
    width: 32px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .card-emoji {
    font-size: 2rem;
    display: block;
    margin-bottom: 8px;
    line-height: 1;
  }

  .card-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.35rem;
    font-weight: 800;
    color: #1C0848;
    margin-bottom: 10px;
    line-height: 1.25;
    letter-spacing: -0.3px;
  }

  .card-body {
    font-size: 0.94rem;
    font-weight: 700;
    line-height: 1.75;
    color: #4A3068;
    flex: 1; /* pushes action to bottom */
  }

  .card-divider {
    margin: 16px 0 0;
    border: none;
    border-top: 1px dashed rgba(140,90,200,0.2);
    flex-shrink: 0;
  }

  .card-expert {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 1px;
    flex-shrink: 0;
  }
  .card-expert-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.2px;
  }
  .card-expert-source {
    font-size: 0.75rem;
    font-weight: 700;
    color: #9070B8;
    font-style: italic;
  }

  .card-action {
    align-self: flex-start;
    margin-top: 16px;
    font-size: 0.84rem;
    font-weight: 900;
    padding: 9px 18px;
    border-radius: 50px;
    letter-spacing: 0.2px;
    flex-shrink: 0;
    cursor: default;
  }
  .card-action::before { content: '→  '; }

  /* ===== QUESTION CARD EXTRAS ===== */
  .card.question-card .card-title {
    font-size: 1.5rem;
    line-height: 1.3;
    color: #1C0848;
    font-style: italic;
    margin-bottom: 0;
  }
  .card.question-card .card-body { display: none; }
  .card.question-card .card-divider { display: none; }
  .card.question-card .card-expert { display: none; }
  .card.question-card .card-prompt {
    margin-top: 16px;
    font-size: 0.82rem;
    font-weight: 900;
    padding: 9px 18px;
    border-radius: 50px;
    align-self: flex-start;
    flex-shrink: 0;
  }

  .acc-peach.question-card .card-prompt { background: #FFF4D8; color: #906010; }

  /* ===== REFRESH BTN ===== */
  .refresh-btn {
    margin-top: 40px;
    padding: 16px 48px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    border: none;
    border-radius: 60px;
    background: linear-gradient(135deg, #C0A0FF 0%, #FF9EC8 50%, #FFD080 100%);
    background-size: 200% 200%;
    animation: btnShift 5s ease infinite;
    color: #fff;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    box-shadow: 0 4px 24px rgba(160,100,255,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
    text-shadow: 0 1px 4px rgba(80,20,140,0.25);
  }
  @keyframes btnShift {
    0%,100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }
  .refresh-btn:hover  { transform: translateY(-2px) scale(1.03); box-shadow: 0 8px 28px rgba(160,100,255,0.45); }
  .refresh-btn:active { transform: scale(0.97); }

  .back-link {
    margin-top: 20px;
    font-size: 0.8rem;
    font-weight: 900;
    color: #9070B8;
    text-decoration: none;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .back-link:hover { color: #4A1E88; }

  @media (max-width: 520px) {
    h1 { font-size: 2.2rem; letter-spacing: -1px; }
    .card { padding: 20px 20px 18px; }
    .card-title { font-size: 1.2rem; }
    .refresh-btn { padding: 14px 32px; }
  }
</style>
</head>
<body>

<div class="bg"></div>

<div class="geo">
  <div class="ring r1"></div><div class="ring r2"></div>
  <div class="ring r3"></div><div class="ring r4"></div>
  <div class="dot d1"></div><div class="dot d2"></div>
  <div class="dot d3"></div><div class="dot d4"></div><div class="dot d5"></div>
  <div class="tri t1"></div><div class="tri t2"></div><div class="tri t3"></div>
  <div class="sq s1"></div><div class="sq s2"></div><div class="sq s3"></div>
</div>

<div class="page">
  <div class="title-block">
    <h1>Daily Lifehacks</h1>
    <p class="subtitle">2 hacks + 1 question to think about</p>
  </div>

  <div class="cards" id="cards"></div>

  <button class="refresh-btn" onclick="render()">Give me more ✦</button>
  <a class="back-link" href="index.html">← Choir Looper</a>
</div>

<script>
const ACCENTS = ['acc-purple', 'acc-green', 'acc-peach'];

const HACKS = [
  { type:'hack', emoji:'🌅', title:'Get Morning Sunlight', expert:'Dr. Andrew Huberman', source:'Huberman Lab Podcast', body:'Get outside within 30 minutes of waking and look toward (not directly at) bright sky for 5–10 minutes. This anchors your circadian clock, boosts cortisol at the right time, and improves sleep quality that night. Even on cloudy days, outdoor light is 10–50x brighter than indoor lighting.', action:'Step outside first thing tomorrow morning — no sunglasses' },
  { type:'hack', emoji:'🥶', title:'Cold Exposure for Dopamine', expert:'Dr. Andrew Huberman', source:'Huberman Lab Podcast', body:'A 1–3 minute cold shower triggers a long-lasting (~3 hour) rise in dopamine and norepinephrine — the chemicals behind motivation and focus. Unlike caffeine, no crash follows. The key: don\'t warm up immediately afterward.', action:'End your next shower with 60 seconds of cold water' },
  { type:'hack', emoji:'😮‍💨', title:'Physiological Sigh', expert:'Dr. Andrew Huberman', source:'Huberman Lab / Stanford', body:'Double-inhale through the nose, then a long exhale through the mouth. The fastest known way to reduce stress in real time — it deflates air sacs in the lungs, offloads CO₂, and activates the parasympathetic nervous system.', action:'Try it right now — one double-inhale, long exhale' },
  { type:'hack', emoji:'🏃', title:'Habit Stacking', expert:'James Clear', source:'Atomic Habits', body:'"After I [current habit], I will [new habit]." Linking a behavior to an existing cue removes the need to remember or find motivation. E.g. "After I pour my morning coffee, I will write in my journal for 2 minutes."', action:'Write one habit stack you\'ll start tomorrow' },
  { type:'hack', emoji:'🔬', title:'Make It Obvious', expert:'James Clear', source:'Atomic Habits', body:'The most powerful way to build a habit is to make the cue visible. Want to take vitamins? Put them next to the coffee maker. Want to read more? Leave the book on your pillow. Environment design beats willpower every time.', action:'Rearrange one thing in your environment to trigger a habit' },
  { type:'hack', emoji:'⏱️', title:'The 2-Minute Rule', expert:'David Allen', source:'Getting Things Done', body:'If a task takes less than 2 minutes to complete, do it immediately — don\'t put it on a list. The mental overhead of tracking a 2-minute task costs more than just doing it. Applies to emails, quick tidying, small decisions.', action:'Find one deferred 2-minute task and do it right now' },
  { type:'hack', emoji:'🗓️', title:'Time-Block Your Day', expert:'Cal Newport', source:'Deep Work', body:'Assign every hour of your workday to a specific task in advance. Unscheduled time gets filled by other people\'s priorities. A 20-minute planning session each morning produces far more output than reactive to-do lists.', action:'Block 2 hours tomorrow for your most important work' },
  { type:'hack', emoji:'📵', title:'Digital Declutter', expert:'Cal Newport', source:'Digital Minimalism', body:'Delete all optional social media apps from your phone for 30 days. At the end, only reinstall ones that genuinely serve your values. Reclaiming attention is more valuable than any single productivity technique.', action:'Delete one app you open out of habit, not purpose' },
  { type:'hack', emoji:'😴', title:'Consistent Wake Time', expert:'Dr. Matthew Walker', source:'Why We Sleep', body:'Your wake time is the anchor of your entire sleep schedule. A consistent wake time — including weekends — stabilizes your circadian rhythm more powerfully than any supplement. Going to bed at varying times is less harmful than waking at varying times.', action:'Set a fixed alarm for tomorrow and every day this week' },
  { type:'hack', emoji:'💪', title:'Zone 2 Cardio', expert:'Dr. Peter Attia', source:'Outlive', body:'Zone 2 cardio — low intensity where you can hold a conversation — is the single most important exercise for long-term health. 150–180 min per week builds mitochondrial density and cardiovascular resilience without recovery cost.', action:'Schedule a 30-minute easy walk or bike ride this week' },
  { type:'hack', emoji:'🏋️', title:'Muscle Mass Is a Longevity Drug', expert:'Dr. Peter Attia', source:'Outlive', body:'Muscle mass and strength are among the strongest predictors of longevity. People with the most muscle in their 40s–50s have dramatically lower all-cause mortality. Resistance training twice a week is essential.', action:'Book a strength training session this week — bodyweight counts' },
  { type:'hack', emoji:'💰', title:'Automate Your Finances', expert:'Ramit Sethi', source:'I Will Teach You to Be Rich', body:'Set up automatic transfers so money flows to savings and investments on payday — before you can spend it. Automation removes willpower from the equation. You don\'t need to budget; you need a good system.', action:'Set up one automatic savings transfer today, even $25' },
  { type:'hack', emoji:'🎉', title:'Celebrate After Every Habit', expert:'BJ Fogg', source:'Tiny Habits', body:'Immediately after a habit — even a tiny one — celebrate with a genuine emotion (fist pump, smile). Fogg\'s research shows this creates a direct neurological reward that wires the habit faster than any other technique.', action:'After your next habit, add a small celebration — feel it' },
  { type:'hack', emoji:'🌱', title:'Shrink the Habit First', expert:'BJ Fogg', source:'Tiny Habits', body:'"Floss one tooth." "Do one push-up." "Write one sentence." Motivation is unreliable; starting tiny bypasses the resistance that kills most habit attempts. Size doesn\'t matter at the start — consistency does.', action:'Pick a failed habit — shrink it to under 2 minutes' },
  { type:'hack', emoji:'5️⃣', title:'The 5-Second Rule', expert:'Mel Robbins', source:'The 5 Second Rule', body:'When you feel hesitation, count 5-4-3-2-1 and move. This interrupts the brain\'s habit of generating excuses and activates the prefrontal cortex. Developed to get out of bed — it works for any moment of resistance.', action:'Use it next time you hesitate before something you should do' },
  { type:'hack', emoji:'📚', title:'Read What You\'re Curious About', expert:'Naval Ravikant', source:'Almanack of Naval Ravikant', body:'Don\'t force yourself to finish books. Read from genuine curiosity — not obligation. Naval argues this produces the kind of deep, connected knowledge that generates original insights over time.', action:'Abandon a book you\'re forcing and start one you actually want' },
  { type:'hack', emoji:'🎯', title:'Find Your ONE Thing', expert:'Gary Keller', source:'The ONE Thing', body:'"What\'s the ONE thing I can do such that by doing it, everything else becomes easier or unnecessary?" Extraordinary results come from narrowing focus, not expanding it.', action:'Identify your ONE thing for tomorrow before bed tonight' },
  { type:'hack', emoji:'😰', title:'Fear-Setting', expert:'Tim Ferriss', source:'The 4-Hour Workweek / TED Talk', body:'Write down the worst-case scenario for something you\'re afraid to do. How likely is it? Could you recover? What\'s the cost of NOT doing it? Ferriss argues fear of action is almost always worse than its reality.', action:'Write down one fear and answer those three questions' },
  { type:'hack', emoji:'🙏', title:'Specific Gratitude', expert:'Brené Brown', source:'The Gifts of Imperfection', body:'"I\'m grateful for my health" does nothing. "I\'m grateful for the conversation with my sister that made me laugh until I cried" — that does. Specificity forces genuine attention and creates real emotional shift.', action:'Write one specific, detailed thing you\'re grateful for now' },
  { type:'hack', emoji:'🌿', title:'Eat Food, Mostly Plants', expert:'Michael Pollan', source:'In Defense of Food', body:'"Eat food. Not too much. Mostly plants." Seven words that beat most diet books. "Food" means ingredients your great-grandmother would recognize. If it has more than five ingredients, reconsider.', action:'Cook one meal this week using only whole ingredients' },
  { type:'hack', emoji:'🧠', title:'Pre-Mortem Your Projects', expert:'Daniel Kahneman', source:'Thinking, Fast and Slow', body:'Before starting a project, imagine it\'s one year later and it failed. Write down why. This "pre-mortem" surfaces risks your brain would otherwise suppress to stay optimistic. It consistently catches fatal flaws early.', action:'Run a quick pre-mortem on your current biggest project' },
  { type:'hack', emoji:'⚖️', title:'Subtract Before You Add', expert:'Nassim Taleb', source:'Antifragile', body:'"Via negativa": improvement often comes from removing bad things, not adding good ones. Removing junk food beats adding green juice. Removing distractions beats adding focus techniques.', action:'Identify one thing to remove from your life this week' },
  { type:'hack', emoji:'🧘', title:'NSDR / Yoga Nidra', expert:'Dr. Andrew Huberman', source:'Huberman Lab Podcast', body:'A 10–20 minute body-scan meditation restores mental energy as effectively as a nap, without grogginess. Huberman does it daily after workouts or lunch. Free scripts are widely available on YouTube.', action:'Try a 10-minute NSDR session today' },
  { type:'hack', emoji:'🌡️', title:'Regular Sauna Use', expert:'Dr. Rhonda Patrick', source:'FoundMyFitness Podcast', body:'Sauna use 4x/week at ~175°F for 20 minutes is associated with significantly lower cardiovascular mortality. It boosts growth hormone and mimics some effects of cardio. Even 2x/week shows measurable benefit.', action:'Find a gym near you with a sauna this week' },
  { type:'hack', emoji:'🫀', title:'Walk After Every Meal', expert:'Dr. Peter Attia', source:'Outlive / glucose monitoring research', body:'A 10-minute walk after eating blunts the blood glucose spike by 30–50%. Repeated spikes over time drive insulin resistance. This habit costs nothing and works immediately.', action:'Take a 10-minute walk after your next meal' },
  { type:'hack', emoji:'📓', title:'Capture Everything in One Place', expert:'David Allen', source:'Getting Things Done', body:'Your brain is for having ideas, not storing them. Cognitive overhead from trying to remember things drains mental energy all day. One trusted capture system — phone notes, notebook — gets everything out of your head.', action:'Do a brain dump right now — write down everything on your mind' },
  { type:'hack', emoji:'🏡', title:'Own Your Morning', expert:'Robin Sharma', source:'The 5 AM Club', body:'First 60 minutes: 20 min move, 20 min reflect, 20 min grow. Whoever controls your morning controls your day. Own the first hour before emails and other people\'s agendas arrive.', action:'Block the first hour of tomorrow and plan what you\'ll do with it' }
];

const QUESTIONS = [
  { type:'question', emoji:'🤔', title:'What\'s one thing you keep saying "someday" about — that you haven\'t started?', prompt:'Sit with this one. Write your answer.' },
  { type:'question', emoji:'🔭', title:'If you could only work on one project for the next 6 months, what would it be and why?', prompt:'Be honest with yourself.' },
  { type:'question', emoji:'💡', title:'What belief do you hold today that you couldn\'t have defended 5 years ago?', prompt:'What changed you?' },
  { type:'question', emoji:'🚀', title:'What would you attempt if you genuinely knew you couldn\'t fail?', prompt:'The answer tells you something important.' },
  { type:'question', emoji:'❤️', title:'Who in your life deserves a thank-you that you still haven\'t said?', prompt:'Maybe today is the day.' },
  { type:'question', emoji:'🛠️', title:'What one skill, fully developed, would change everything for you?', prompt:'What\'s stopping you from developing it?' },
  { type:'question', emoji:'🗑️', title:'What drains you every week that you could actually just stop doing?', prompt:'Permission granted.' },
  { type:'question', emoji:'📅', title:'What does your ideal Tuesday look like? How different is it from last Tuesday?', prompt:'The gap is the work.' },
  { type:'question', emoji:'🪞', title:'What\'s one truth about yourself you\'ve been avoiding thinking about?', prompt:'Write it down privately. Just seeing it changes things.' },
  { type:'question', emoji:'⏳', title:'If your 10-years-older self sent you one piece of advice right now, what would it be?', prompt:'You probably already know the answer.' },
  { type:'question', emoji:'🎯', title:'What are you actually optimizing your life for right now — and is that what you want?', prompt:'Most people haven\'t asked this explicitly.' },
  { type:'question', emoji:'🗣️', title:'What\'s the conversation you\'ve been putting off that you know you need to have?', prompt:'Delayed honesty costs more than immediate honesty.' },
  { type:'question', emoji:'🌱', title:'What small daily action would make you proudest if you did it consistently for a year?', prompt:'Start tomorrow. Just once.' },
  { type:'question', emoji:'🧩', title:'What problem do you keep solving over and over — and what would it look like to solve it once?', prompt:'Systems beat willpower.' },
  { type:'question', emoji:'💸', title:'Are you spending money on things that actually make you happy, or things you think should?', prompt:'The receipts tell the real story.' }
];

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function pickMix() {
  const hacks = shuffle(HACKS).slice(0, 2);
  const question = shuffle(QUESTIONS)[0];
  const mixed = shuffle([...hacks, question]);
  return mixed;
}

function render() {
  const container = document.getElementById('cards');
  container.innerHTML = '';
  requestAnimationFrame(() => {
    const items = pickMix();
    // assign accent colors: rotate through purple, green, peach
    // questions always get peach; hacks rotate purple/green
    let hackIdx = 0;
    const hackAccents = ['acc-purple', 'acc-green'];
    items.forEach((item, i) => {
      const card = document.createElement('div');
      let accent;
      if (item.type === 'question') {
        accent = 'acc-peach';
      } else {
        accent = hackAccents[hackIdx % 2];
        hackIdx++;
      }
      card.className = `card ${accent}${item.type === 'question' ? ' question-card' : ''}`;

      if (item.type === 'hack') {
        card.innerHTML = `
          <div class="card-label">Hack ${i + 1}</div>
          <span class="card-emoji">${item.emoji}</span>
          <div class="card-title">${item.title}</div>
          <div class="card-body">${item.body}</div>
          <hr class="card-divider">
          <div class="card-expert">
            <div class="card-expert-name">${item.expert}</div>
            <div class="card-expert-source">${item.source}</div>
          </div>
          <div class="card-action">${item.action}</div>
        `;
      } else {
        card.innerHTML = `
          <div class="card-label">Think about this</div>
          <span class="card-emoji">${item.emoji}</span>
          <div class="card-title">${item.title}</div>
          <div class="card-prompt">${item.prompt}</div>
        `;
      }
      container.appendChild(card);
    });
  });
}

render();
</script>
</body>
</html>
